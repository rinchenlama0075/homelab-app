# Bodhicharya Foundation — plain static site, no build step, no database.
# Independent from every other site in this repo (see sites/personal for
# comparison): no shared containers, network, or domain.
server {
    listen 80 default_server;
    server_name bodhicharyafoundation.org www.bodhicharyafoundation.org _;

    root /usr/share/nginx/html;
    index index.html;

    location /health {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    # Multi-page static site: /about resolves to about.html. Unknown paths
    # trigger a real 404 (via `=404`), and error_page serves 404.html while
    # preserving the 404 status code.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;
}
