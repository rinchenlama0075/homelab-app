services:
  api:
    build: ./server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - OWNER_JWT_SECRET=${OWNER_JWT_SECRET:-dev-owner-secret-change-me}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:3003}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    volumes:
      - api_data:/app/data
    expose:
      - "4100"
    networks:
      - default

  web:
    build: .
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:3003:80"
    networks:
      - default

volumes:
  api_data:

networks:
  default:
