# Private admin dashboard — only ever served for Host: admin.rinchen.co.
# Matched first (nginx picks the first matching server_name), so there is no
# path on the public site below that can reach this block.
server {
    listen 80;
    server_name admin.rinchen.co;

    root /usr/share/nginx/admin;
    index index.html;

    location /api/ {
        proxy_pass http://admin:4001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Public site — rinchen.co (and anything else that isn't admin.rinchen.co,
# via server_name _ as the default/catch-all).
server {
    listen 80 default_server;
    server_name rinchen.co www.rinchen.co _;
    root /usr/share/nginx/html;
    index index.html;

    location /health {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    location /api/ {
        proxy_pass http://api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
