services:
  api:
    build: ./server
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    volumes:
      - api_data:/app/data
    expose:
      - "4000"

  web:
    build: .
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:3001:80"

volumes:
  api_data:
